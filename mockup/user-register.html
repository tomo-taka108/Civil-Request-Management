<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>ユーザー登録 | 土木事務所 苦情・要望管理システム</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Zen+Kaku+Gothic+New:wght@500;700;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="common.css">
</head>
<body>
<div class="mock-banner">モックアップ（表示イメージ確認用・実データではありません）</div>
<header class="app-header">
  <div class="brand">苦情・要望管理システム</div>
  <nav>
    <a href="list.html">案件一覧</a>
    <a href="#">地図表示</a>
    <a href="register.html">新規登録</a>
    <a class="active" href="user-register.html">ユーザー管理</a>
  </nav>
  <div class="user">〇〇土木事務所 システム管理者　<a href="password-change.html">パスワード変更</a>｜<a href="login.html">ログアウト</a></div>
</header>

<main class="app-main">
  <div style="display:flex; justify-content:space-between; align-items:center;">
    <h1 class="page-title">ユーザー登録</h1>
    <a class="btn btn-secondary" href="#">ユーザー一覧に戻る</a>
  </div>

  <div class="note" style="margin-bottom:16px;">この画面は「システム管理者」権限を持つユーザーのみ利用できます。</div>

  <form class="card">
    <div class="section-heading">アカウント情報</div>
    <div class="form-grid">
      <label class="required">ユーザーID</label>
      <div>
        <input type="text" placeholder="例：yamada_t">
        <div class="note">ログイン時に使用します。事務所内で一意になるよう設定してください</div>
      </div>

      <label class="required">氏名</label>
      <input type="text" placeholder="例：山田 太郎">

      <label class="required">初期パスワード</label>
      <div>
        <input type="password" placeholder="初期パスワードを入力">
        <div class="note">初回ログイン時に本人がパスワードを変更する運用を想定</div>
      </div>
    </div>

    <div class="section-heading">所属・権限</div>
    <div class="form-grid">
      <label class="required">所属事務所</label>
      <select>
        <option>〇〇土木事務所</option>
        <option>△△土木事務所</option>
        <option>□□土木事務所</option>
      </select>

      <label class="required">担当部署</label>
      <div class="radio-group">
        <label><input type="radio" name="dept" checked>道路</label>
        <label><input type="radio" name="dept">河川</label>
        <label><input type="radio" name="dept">砂防</label>
        <label><input type="radio" name="dept">その他（土木事務所以外）</label>
      </div>
      <div style="grid-column:2;" class="note">担当部署に応じて、該当案件の編集・削除権限が付与されます（閲覧は全職員が可能）</div>

      <label class="required">権限区分</label>
      <div class="radio-group">
        <label><input type="radio" name="role" checked>一般職員</label>
        <label><input type="radio" name="role">システム管理者</label>
      </div>
      <div style="grid-column:2;" class="note">システム管理者はユーザー登録・編集・無効化が可能です</div>

      <label>アカウント状態</label>
      <div class="radio-group">
        <label><input type="radio" name="status" checked>有効</label>
        <label><input type="radio" name="status">無効化（異動・退職時）</label>
      </div>
    </div>

    <div class="btn-row">
      <a class="btn btn-secondary" href="#">キャンセル</a>
      <a class="btn btn-primary" href="#">登録する</a>
    </div>
  </form>
</main>
</body>
</html>
