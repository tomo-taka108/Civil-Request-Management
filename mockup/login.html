<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>ログイン | CivilTrack</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Zen+Kaku+Gothic+New:wght@500;700;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="common.css">
</head>
<body>
<div class="mock-banner">モックアップ（表示イメージ確認用・実データではありません）</div>
<div class="login-wrap">
  <div class="login-card">
    <h1>CivilTrack</h1>
    <div class="tagline">土木施設要望・対応管理システム</div>
    <div class="subtitle">土木事務所 職員ログイン</div>
    <form>
      <div class="field">
        <label for="user-id">ユーザーID</label>
        <input type="text" id="user-id" placeholder="ユーザーIDを入力">
      </div>
      <div class="field">
        <label for="password">パスワード</label>
        <input type="password" id="password" placeholder="パスワードを入力">
      </div>
      <a class="btn btn-primary" href="list.html">ログイン</a>
    </form>
    <div class="login-footer">
      ID・パスワードを忘れた場合は管理者にお問い合わせください<br>
      <a href="password-change.html">初回ログインの方はこちら</a>
    </div>
  </div>
</div>
</body>
</html>
