<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>パスワード変更 | CivilTrack</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Zen+Kaku+Gothic+New:wght@500;700;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="common.css">
</head>
<body>
<div class="mock-banner">モックアップ（表示イメージ確認用・実データではありません）</div>
<div class="login-wrap">
  <div class="login-card">
    <h1>パスワード変更</h1>
    <div class="subtitle">現在のパスワードを入力のうえ<br>新しいパスワードを設定してください</div>
    <form>
      <div class="field">
        <label for="current-password">現在のパスワード（初回ログイン時は初期パスワード）</label>
        <input type="password" id="current-password" placeholder="現在のパスワードを入力">
      </div>
      <div class="field">
        <label for="new-password">新しいパスワード</label>
        <input type="password" id="new-password" placeholder="8文字以上の新しいパスワード">
      </div>
      <div class="field">
        <label for="new-password-confirm">新しいパスワード（確認）</label>
        <input type="password" id="new-password-confirm" placeholder="確認のためもう一度入力">
      </div>
      <a class="btn btn-primary" href="list.html">変更する</a>
    </form>
    <div class="login-footer">
      変更後は新しいパスワードで<br>再度ログインしてください<br>
      <a href="login.html">ログイン画面に戻る</a>
    </div>
  </div>
</div>
</body>
</html>
